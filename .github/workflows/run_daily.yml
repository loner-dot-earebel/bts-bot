name: BTS Daily Picks

on:
  schedule:
    - cron: '0 14 * * *'  # adjust for your timezone (2 PM UTC here)
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1️⃣ Checkout your repository
      - uses: actions/checkout@v3

      # 2️⃣ Set up Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11

      # 3️⃣ Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests

      # 4️⃣ Run BTS bot
      - name: Run BTS bot
        run: python main.py

      # 5️⃣ Upload daily CSV as artifact
      - name: Upload daily probabilities CSV
        uses: actions/upload-artifact@v3
        with:
          name: daily_probabilities
          path: data/daily_probabilities.csv
