name: BTS Daily Picks

on:
  schedule:
    - cron: '0 14 * * *'  # adjust for your timezone
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests

      - name: Run BTS bot
        run: python main.py

      - name: Upload daily probabilities CSV
        uses: actions/upload-artifact@v4
        with:
          name: daily_probabilities
          path: data/daily_probabilities.csv
