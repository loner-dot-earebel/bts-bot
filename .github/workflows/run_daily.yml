name: BTS Daily Picks

on:
  schedule:
    - cron: '0 14 * * *'  # runs every day at 2 PM UTC (adjust for your timezone)
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests
      - name: Run BTS bot
        run: python main.py
              - name: Commit daily probabilities
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add data/daily_probabilities.csv
          git commit -m "Update daily probabilities"
          git push
